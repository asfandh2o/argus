services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: argus_db
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus_password
    ports:
      - "5434:5432"
    volumes:
      - argus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  api:
    build: .
    ports:
      - "8002:8002"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql+asyncpg://argus:argus_password@db:5432/argus_db
      - REDIS_URL=redis://redis:6379/0

  worker:
    build: .
    command: celery -A workers.celery_app worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql+asyncpg://argus:argus_password@db:5432/argus_db
      - REDIS_URL=redis://redis:6379/0

  beat:
    build: .
    command: celery -A workers.celery_app beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql+asyncpg://argus:argus_password@db:5432/argus_db
      - REDIS_URL=redis://redis:6379/0

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://api:8002
    depends_on:
      - api

volumes:
  argus_pgdata:
